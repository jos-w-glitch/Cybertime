<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joseph Weiss</title>
  <meta name="description" content="joseph-weiss.com — projects and games">
  <link rel="icon" type="image/png" href="cybertime/assets/icon-192.png">
  <link rel="canonical" href="https://www.joseph-weiss.com/">
  <!--STYLES-->
</head>
<body>
  <div class="cyber-bg" aria-hidden="true">
    <div class="grid"></div>
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
    <div class="scanlines"></div>
  </div>

  <main class="page">
    <header class="hero">
      <div class="avatar-wrap">
        <div class="avatar-ring"></div>
        <div class="avatar">JW</div>
      </div>
      <p class="domain">joseph-weiss.com</p>
      <h1>Joseph Weiss</h1>
      <p class="tagline">Games and interactive projects</p>
      <div class="hero-line"></div>
    </header>

    <section class="projects" aria-label="Projects">
      <div class="section-head">
        <h2 class="section-title">&gt; MY PROJECTS</h2>
        <span class="section-count">01 project</span>
      </div>

      <ul class="project-list">
        <li>
          <a class="project-card" href="/cybertime/">
            <div class="card-corner tl"></div>
            <div class="card-corner tr"></div>
            <div class="card-corner bl"></div>
            <div class="card-corner br"></div>
            <div class="project-thumb-wrap">
              <img class="project-thumb" src="cybertime/assets/logo.png" alt="cybertime">
            </div>
            <div class="project-body">
              <div class="project-tags">
                <span class="tag tag-cyan">Game</span>
                <span class="tag tag-blue">Web</span>
              </div>
              <span class="project-name">cybertime</span>
              <span class="project-desc">Cyberpunk rhythm timing game — 12 stages, leaderboards, and infinite mode</span>
              <span class="project-cta">PLAY NOW</span>
            </div>
          </a>
        </li>
      </ul>
    </section>

    <footer class="footer">
      <p>© 2026 Joseph Weiss</p>
    </footer>
  </main>
  <script type="module">
    import { inject } from "/analytics.mjs";
    inject();
  </script>
</body>
</html>
