<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>cybertime</title>
  <meta name="description" content="cybertime — rhythm timing game">
  <meta name="application-name" content="cybertime">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="screen-orientation" content="portrait">
  <meta name="x5-orientation" content="portrait">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="apple-touch-icon" href="assets/logo.png">
  <style>
    @font-face {
      font-family: "Cyberjunkies";
      src: url("assets/fonts/Cyberjunkies.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      min-height: 100dvh;
      overflow: hidden;
      background: #0a0a12;
      font-family: "Cyberjunkies", sans-serif;
      touch-action: none;
      overscroll-behavior: none;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    html.mobile-device body.game-playing {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100dvh;
    }
    html.mobile-device body.game-playing #wrapper {
      width: 100%;
      height: 100dvh;
    }
    #wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #wrapper.session-active {
      pointer-events: auto;
    }
    html.mobile-device.portrait-css-lock body {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 100dvh;
      height: 100dvw;
      transform: translate(-50%, -50%) rotate(90deg);
      transform-origin: center center;
      overflow: hidden;
    }
    html.mobile-device.portrait-css-lock #wrapper {
      width: 100%;
      height: 100%;
    }
    html.mobile-device.portrait-css-lock #name-overlay {
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      max-width: 100%;
      max-height: 100%;
      cursor: none;
      -webkit-tap-highlight-color: transparent;
    }
    @media (pointer: coarse) {
      canvas {
        width: min(100vw, calc(100vh * 9 / 16));
        height: min(100vh, calc(100vw * 16 / 9));
        cursor: default;
      }
    }
    #name-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a12;
      z-index: 100;
      pointer-events: auto;
    }
    #name-overlay.hidden {
      display: none !important;
      pointer-events: none;
    }
    #name-overlay:not(.hidden) { pointer-events: auto; }
    #login-title {
      color: #00b4ff;
      font-size: 1.4rem;
      margin-bottom: 12px;
    }
    #login-title.hidden, #name-cancel.hidden, #name-panel p.hidden { display: none; }
    #name-panel {
      width: min(440px, 94vw);
      padding: 28px 32px 36px;
      text-align: center;
    }
    #name-logo {
      width: min(400px, 96%);
      height: auto;
      display: block;
      margin: 0 auto 20px;
      border-radius: 10px;
      box-shadow: 0 0 32px rgba(255, 220, 0, 0.3);
    }
    #name-panel p {
      color: #00ffc8;
      margin-bottom: 20px;
      font-size: 0.95rem;
      line-height: 1.4;
    }
    .name-input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 12px;
      border: 2px solid #3c3c4b;
      border-radius: 8px;
      background: #12121c;
      color: #00ffc8;
      font-family: inherit;
      font-size: 1.1rem;
      outline: none;
      text-align: center;
    }
    .name-input:focus { border-color: #00ffc8; }
    #name-error {
      min-height: 22px;
      color: #ff0064;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }
    #name-play {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #00b478;
      color: #0a0a12;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
    }
    #name-play:hover { background: #00ff96; }
    #name-cancel {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: 2px solid #3c3c4b;
      border-radius: 8px;
      background: transparent;
      color: #8090a0;
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
    }
    #name-cancel:hover { border-color: #8090a0; color: #00ffc8; }
    #pin-hint {
      color: #8090a0;
      font-size: 0.85rem;
      margin-bottom: 12px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div id="name-overlay" class="hidden">
    <div id="name-panel">
      <img id="name-logo" src="assets/logo.png" alt="cybertime">
      <div id="login-title" class="hidden">LOGIN</div>
      <p>Save progress and compete on leaderboards.</p>
      <div id="pin-hint">Name + PIN syncs your profile.</div>
      <form id="name-form" action="#" onsubmit="return false;">
        <input id="player-name" class="name-input" type="text" maxlength="16" autocomplete="username" placeholder="Your name">
        <input id="player-pin" class="name-input" type="password" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="current-password" placeholder="4-digit PIN">
        <div id="name-error"></div>
        <button id="name-play" type="button">LOGIN</button>
        <button id="name-cancel" type="button" class="hidden">CANCEL</button>
      </form>
    </div>
  </div>

  <div id="wrapper">
    <canvas id="game" width="1280" height="720"></canvas>
  </div>

  <script>
    window.__cybertimeLoadError = null;
    window.__cybertimeScriptFail = (name) => {
      if (!window.__cybertimeLoadError) window.__cybertimeLoadError = name;
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js" onerror="__cybertimeScriptFail('js/config.js')"></script>
  <script src="js/supabase-config.js" onerror="__cybertimeScriptFail('js/supabase-config.js')"></script>
  <script src="js/supabase.js" onerror="__cybertimeScriptFail('js/supabase.js')"></script>
  <script src="js/auth.js" onerror="__cybertimeScriptFail('js/auth.js')"></script>
  <script src="js/storage.js" onerror="__cybertimeScriptFail('js/storage.js')"></script>
  <script src="js/input.js" onerror="__cybertimeScriptFail('js/input.js')"></script>
  <script src="js/mobile.js" onerror="__cybertimeScriptFail('js/mobile.js')"></script>
  <script src="js/draw.js" onerror="__cybertimeScriptFail('js/draw.js')"></script>
  <script src="js/entities.js" onerror="__cybertimeScriptFail('js/entities.js')"></script>
  <script src="js/audio.js" onerror="__cybertimeScriptFail('js/audio.js')"></script>
  <script src="js/game.js" onerror="__cybertimeScriptFail('js/game.js')"></script>
  <script src="js/ui.js" onerror="__cybertimeScriptFail('js/ui.js')"></script>
  <script src="js/main.js" onerror="__cybertimeScriptFail('js/main.js')"></script>
</body>
</html>
